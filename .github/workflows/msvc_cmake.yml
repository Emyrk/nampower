name: CMake

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  BUILD_TYPE: Release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Download hadesmem release
      run: |
        Invoke-WebRequest https://github.com/namreeb/hadesmem/releases/download/v1.7.0/hadesmem-v142-Release-Win32.zip -OutFile hadesmem.zip
        Expand-Archive -Path hadesmem.zip -DestinationPath .

    - name: Download Boost
      run: |
        Invoke-WebRequest https://archives.boost.io/release/1.78.0/source/boost_1_78_0.zip -OutFile boost.zip
        Expand-Archive -Path boost.zip -DestinationPath .

    - name: Build Boost
      shell: cmd
      run: |
        cd boost_1_78_0
        call bootstrap.bat
        b2 --with-filesystem --with-program_options link=static threading=multi runtime-link=shared architecture=x86 address-model=32 stage

    - name: Configure CMake
      run: cmake -A Win32 -B ${{github.workspace}}/build -DBOOST_ROOT=${{github.workspace}}/boost_1_78_0 -DBOOST_INCLUDEDIR=${{github.workspace}}/boost_1_78_0 -DBOOST_LIBRARYDIR=${{github.workspace}}/boost_1_78_0/stage/lib -DHADESMEM_ROOT=${{github.workspace}}/hadesmem-v142-Release-Win32 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/artifact

    - name: Build
      run: |
        cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
        cmake --install ${{github.workspace}}/build

    - name: Publish artifact
      uses: actions/upload-artifact@v4
      with:	
        name: artifact
        path: ${{ github.workspace }}/artifact/*

    - name: Setup release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        move artifact nampower-${{ github.ref_name }}
        Compress-Archive nampower-${{ github.ref_name }} nampower-${{ github.ref_name }}.zip

    - uses: softprops/action-gh-release@v2
      name: Upload assets to release
      if: startsWith(github.ref, 'refs/tags/')
      with:
        draft: false
        files: |
          nampower-${{ github.ref_name }}.zip
          nampower-${{ github.ref_name }}/nampower.dll
        fail_on_unmatched_files: true